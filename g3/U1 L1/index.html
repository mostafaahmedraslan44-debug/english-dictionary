<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاموس الكلمات الإلكتروني</title>
    <!-- إضافة Manifest لدعم التثبيت على الهاتف -->
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; font-size: 24px; }
        h2 { color: #16a085; font-size: 18px; margin-bottom: 20px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-speak {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-speak:hover { background-color: #219653; }
    </style>
</head>
<body>

<div class="container">
    <h1>قاموس كلمات اللغة الإنجليزية</h1>
    <!-- يمكنك تعديل الصف والدرس هنا لكل ملف -->
    <h2>الصف السادس الابتدائي - الوحدة الأولى (Lesson 1)</h2> 

    <table>
        <thead>
            <tr>
                <th>الكلمة (Word)</th>
                <th>المعنى (Meaning)</th>
                <th>النطق (Listen)</th>
            </tr>
        </thead>
        <tbody>
            <!-- كرر الأسطر التالية لكل كلمة جديدة -->
            <tr>
                <td><strong>Attractive</strong></td>
                <td>جذاب</td>
                <td><button class="btn-speak" onclick="speak('Attractive')">🔊 استمع</button></td>
            </tr>
            <tr>
                <td><strong>Crucial</strong></td>
                <td>مهم جداً / حاسم</td>
                <td><button class="btn-speak" onclick="speak('Crucial')">🔊 استمع</button></td>
            </tr>
            <tr>
                <td><strong>Authority</strong></td>
                <td>سلطة / هيئة</td>
                <td><button class="btn-speak" onclick="speak('Authority')">🔊 استمع</button></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // دالة النطق الصوتي باللكنة الإنجليزية
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // إيقاف أي نطق سابق
            var utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // يمكنك تغييرها إلى en-GB للكنة البريطانية
            utterance.rate = 0.9;     // إبطاء السرعة قليلاً لتسهيل الفهم على الطلاب
            window.speechSynthesis.speak(utterance);
        } else {
            alert("عذراً، متصفحك لا يدعم النطق الصوتي.");
        }
    }

    // تفعيل الـ Service Worker ليعمل الموقع بدون إنترنت
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').then(function(registration) {
                console.log('ServiceWorker registered with scope: ', registration.scope);
            }, function(err) {
                console.log('ServiceWorker registration failed: ', err);
            });
        });
    }
</script>

</body>
</html>
